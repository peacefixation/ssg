{{define "tags-cloud.html"}}
<!DOCTYPE html>
<html lang="en">
<head>{{template "head.html" .}}</head>
<body>
  {{template "nav.html" .}}

  <div id="tag-data" aria-hidden="true">
    {{range .List}}{{.}}{{end}}
  </div>

  <div class="tags-cloud-container" id="tag-cloud"></div>

  <noscript><p>Enable JavaScript to view the tag cloud, or visit the
    <a href="/tags/index.html">tags list</a>.</p></noscript>

  {{template "foot.html" .}}

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-cloud@1/build/d3.layout.cloud.js"></script>
  <script>
  (function () {
    const minSize = 13, maxSize = 48, height = 400;

    const container = document.getElementById('tag-cloud');
    const width = container.clientWidth || 800;

    const cs = getComputedStyle(container);
    const hueLo     = parseFloat(cs.getPropertyValue('--cloud-hue-lo'))    || 200;
    const hueHi     = parseFloat(cs.getPropertyValue('--cloud-hue-hi'))    || 260;
    const lightness = parseFloat(cs.getPropertyValue('--cloud-lightness')) || 0.50;
    const chroma    = parseFloat(cs.getPropertyValue('--cloud-chroma'))    || 0.18;

    const words = Array.from(document.querySelectorAll('.tag-datum')).map(el => ({
      text:   el.dataset.text,
      weight: parseFloat(el.dataset.weight),
      count:  el.dataset.count,
      href:   el.dataset.href,
    }));

    words.forEach(w => { w.size = minSize + w.weight * (maxSize - minSize); });

    d3.layout.cloud()
      .size([width, height])
      .words(words)
      .padding(5)
      .rotate(() => 0)
      .font('system-ui, sans-serif')
      .fontSize(w => w.size)
      .on('end', draw)
      .start();

    function draw(placed) {
      const svg = d3.select(container).append('svg')
        .attr('width', width)
        .attr('height', height)
        .attr('viewBox', `0 0 ${width} ${height}`);

      const g = svg.append('g')
        .attr('transform', `translate(${width / 2},${height / 2})`);

      g.selectAll('a')
        .data(placed)
        .enter()
          .append('a')
          .attr('href', w => w.href)
          .attr('aria-label', w => `${w.text} (${w.count})`)
          .append('text')
            .attr('transform', w => `translate(${w.x},${w.y})`)
            .attr('text-anchor', 'middle')
            .attr('font-size', w => w.size)
            .attr('font-family', w => w.font)
            .attr('fill', w => {
              const hue = hueLo + w.weight * (hueHi - hueLo);
              return `oklch(${lightness} ${chroma} ${hue})`;
            })
            .text(w => w.text);
    }
  })();
  </script>
</body>
</html>
{{end}}
