{{define "blog-card.html"}}
<div class="item">
  <a href="/{{.outputPath}}">
    {{if .icon}}{{render (printf "icon-%s.html" .icon) .}}{{end}}<span class="title">{{.title}}</span>
  </a>
  {{if .description}}<p class="description">{{.description}}</p>{{end}}
  {{template "tag-links.html" .}}
</div>
{{end}}
