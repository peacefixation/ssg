{{define "tag-item-card.html"}}
<div class="item">
  {{if .sourcePath}}
  <span class="source-path">
    {{range .sourcePath}}<a href="/{{.outputPath}}">{{.title}}</a> / {{end}}
  </span>
  {{end}}
  {{if .externalLink}}
  <a href="{{.url}}" target="_blank" rel="noopener noreferrer">
    <span class="title">{{.title}}</span>
  </a>
  {{else}}
  <a href="/{{.outputPath}}">
    <span class="title">{{.title}}</span>
  </a>
  {{end}}
</div>
{{end}}
