{{define "embed/youtube.html"}}
<div class="embed embed-youtube">
  {{$id := youtubeID .url}}
  {{if $id}}
  <iframe
    src="https://www.youtube.com/embed/{{$id}}"
    title="{{.title}}"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
  {{end}}
</div>
{{end}}
