{{define "music-page.html"}}
<!DOCTYPE html>
<html lang="en">
<head>{{template "head.html" .}}</head>
<body>
  {{template "nav.html" .}}
  {{if .embed}}
    {{render (printf "embed/%s.html" .embed) .}}
  {{else}}
    {{if .title}}<h1>{{.title}}</h1>{{end}}
    {{.body}}
  {{end}}
  {{range .List}}{{.}}{{end}}
  {{template "foot.html" .}}
</body>
</html>
{{end}}
