{{define "link-card.html"}}
<div class="item{{if .embed}} {{.embed}}{{end}}">
  {{if .embed}}
    {{render (printf "embed/%s.html" .embed) .}}
  {{else if .url}}
    <a href="{{.url}}" target="_blank" rel="noopener noreferrer">{{.title}}</a>
  {{else}}
    <a href="/{{.outputPath}}">{{.title}}</a>
  {{end}}
  {{template "tag-links.html" .}}
</div>
{{end}}
