{{define "media-embed-card.html"}}
<div class="item">
  <details class="embed-collapsible">
    <summary class="embed-summary">
      <span class="embed-meta">
        <a href="/{{.outputPath}}">{{if .icon}}{{render (printf "icon-%s.html" .icon) .}}{{end}}<span class="title">{{.title}}</span></a>
      </span>
      <span class="embed-toggle-icon">{{render "icon-expand.html" .}}{{render "icon-collapse.html" .}}</span>
    </summary>
    <div class="embed-body">
      {{render (printf "embed/%s.html" .embed) .}}
    </div>
  </details>
  {{template "tag-links.html" .}}
</div>
{{end}}
