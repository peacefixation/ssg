{{define "page.html"}}
<!DOCTYPE html>
<html lang="en">
<head>{{template "head.html" .}}</head>
<body>
  {{if .platform}}
    {{render (printf "platform/%s.html" .platform) .}}
  {{else if .body}}
    {{if .title}}<h1>{{.title}}</h1>{{end}}
    {{.body}}
  {{else if .url}}
    {{render "item.html" .}}
  {{end}}
  {{range .List}}{{.}}{{end}}
  {{template "foot.html" .}}
</body>
</html>
{{end}}
