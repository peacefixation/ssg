{{define "slideshow.html"}}
<!DOCTYPE html>
<html lang="en">
<head>{{template "head.html" .}}</head>
<body>
  {{template "nav.html" .}}
  {{if .title}}<h1>{{.title}}</h1>{{end}}
  <div class="slideshow" data-slideshow>
    <div class="slideshow-track">
      {{range .List}}{{.}}{{end}}
    </div>
    <button class="slideshow-btn slideshow-prev" aria-label="Previous photo">&#8249;</button>
    <button class="slideshow-btn slideshow-next" aria-label="Next photo">&#8250;</button>
    <div class="slideshow-counter"></div>
  </div>
  {{template "foot.html" .}}
</body>
</html>
{{end}}
